<!DOCTYPE html>
<html lang="vi">

	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>JavaScript &amp; HTML Interactive Lab (Fixed Layout)</title>
		<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
		<style>
			* {
			            box-sizing: border-box;
			            margin: 0;
			            padding: 0;
			            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
			        }
			        body {
			            background-color: #121212;
			            color: #e0e0e0;
			            padding: 15px;
			            display: flex;
			            flex-direction: column;
			            min-height: 100vh;
			            gap: 15px;
			        }
			        h2 {
			            font-size: 20px;
			            color: #fff;
			        }
			        .url-bar {
			            display: flex;
			            gap: 10px;
			            background: #1e1e1e;
			            padding: 10px;
			            border-radius: 6px;
			        }
			        .url-bar input {
			            flex: 1;
			            padding: 10px 12px;
			            border: 1px solid #333;
			            background-color: #2a2a2a;
			            color: #fff;
			            border-radius: 4px;
			            font-size: 14px;
			            min-width: 0;
			        }
			        .btn {
			            padding: 10px 16px;
			            border: none;
			            border-radius: 4px;
			            cursor: pointer;
			            font-weight: bold;
			            transition: background 0.2s, transform 0.1s;
			            white-space: nowrap;
			        }
			        .btn:active { transform: scale(0.98); }
			        .btn-primary { background-color: #3498db; color: white; }
			        .btn-success { background-color: #2ecc71; color: white; }
			        .btn-secondary { background-color: #444; color: #fff; }
			        .btn-secondary:hover { background-color: #555; }
			        .btn-danger { background-color: #e74c3c; color: white; }
			
			        /* LAYOUT HÀNG TRÊN */
			        .top-layout {
			            display: flex;
			            gap: 15px;
			        }
			        .panel {
			            flex: 1;
			            display: flex;
			            flex-direction: column;
			            background: #1e1e1e;
			            border-radius: 6px;
			            padding: 15px;
			            min-width: 0;
			        }
			        .panel-header-wrapper {
			            display: flex;
			            justify-content: space-between;
			            align-items: center;
			            margin-bottom: 10px;
			            gap: 10px;
			        }
			        .panel-title {
			            font-weight: bold;
			            color: #bbb;
			            font-size: 14px;
			            white-space: nowrap;
			            overflow: hidden;
			            text-overflow: ellipsis;
			        }
			        .panel-actions {
			            display: flex;
			            gap: 8px;
			        }
			        .mini-action-btn {
			            background: #2a2a2a;
			            border: 1px solid #333;
			            color: #aaa;
			            padding: 4px 8px;
			            font-size: 11px;
			            border-radius: 3px;
			            cursor: pointer;
			            transition: all 0.2s;
			        }
			        .mini-action-btn:hover {
			            background: #3a3a3a;
			            color: #fff;
			        }
			        textarea {
			            width: 100%;
			            height: 320px;
			            resize: vertical;
			            padding: 10px;
			            font-family: 'Courier New', Courier, monospace;
			            font-size: 13px;
			            border: 1px solid #333;
			            border-radius: 4px;
			            background-color: #252525;
			            color: #fff;
			        }
			
			        /* LAYOUT HÀNG DƯỚI */
			        .bottom-layout {
			            display: flex;
			            flex-direction: column;
			            gap: 15px;
			        }
			        .bottom-layout textarea {
			            height: 220px;
			        }
			
			        /* KHUNG HIỂN THỊ CODE EXTRACTED */
			        .code-display-wrapper {
			            width: 100%;
			            height: 220px;
			            max-height: 220px;
			            overflow-y: auto !important;
			            overflow-x: hidden !important;
			            padding: 10px;
			            font-family: 'Courier New', Courier, monospace;
			            font-size: 13px;
			            border: 1px solid #333;
			            border-radius: 4px;
			            background-color: #151515;
			            color: #abb2bf;
			            white-space: pre-wrap !important;
			            word-wrap: break-word !important;
			            word-break: break-all !important;
			            line-height: 1.5;
			            tab-size: 4;
			            -moz-tab-size: 4;
			            position: relative;
			            transition: all 0.2s ease-in-out;
			        }
			        
			        .html-tag { color: #e06c75; font-weight: bold; }
			        .html-bracket { color: #56b6c2; }
			        .html-attr { color: #d19a66; font-weight: bold; }
			        .html-val { color: #98c379; cursor: pointer; border-radius: 2px; }
			        .html-val:hover { background: #2c313c; color: #fff; }
			        .html-text { color: #ffffff; cursor: pointer; }
			        .html-text:hover { background: #2c313c; }
			        
			        .js-controls {
			            margin-top: 10px;
			            display: flex;
			            gap: 10px;
			            align-items: center;
			            overflow-x: auto;
			            padding-bottom: 5px;
			        }
			
			        select {
			            padding: 10px;
			            border: 1px solid #333;
			            background-color: #2a2a2a;
			            color: #fff;
			            border-radius: 4px;
			            min-width: 150px;
			        }
			        
			        .param-input-style {
			            padding: 10px;
			            border: 1px solid #333;
			            background-color: #2a2a2a;
			            color: #fff;
			            border-radius: 4px;
			            width: 140px;
			            font-size: 13px;
			        }
			
			        #panel-extracted { display: none; }
			
			        /* --- SYSTEM TABS --- */
			        .tab-container {
			            flex: 1;
			            background: #1a1a1a;
			            border: 1px solid #333;
			            border-radius: 6px;
			            display: flex;
			            flex-direction: column;
			            min-width: 0;
			        }
			        .tab-headers {
			            display: flex;
			            background: #252525;
			            border-top-left-radius: 5px;
			            border-top-right-radius: 5px;
			            border-bottom: 1px solid #333;
			            justify-content: space-between;
			            align-items: center;
			            padding-right: 10px;
			            overflow-x: auto;
			        }
			        .tab-buttons-group {
			            display: flex;
			        }
			        .tab-button {
			            padding: 12px 15px;
			            background: none;
			            border: none;
			            color: #888;
			            font-weight: bold;
			            font-size: 13px;
			            cursor: pointer;
			            white-space: nowrap;
			            transition: all 0.2s;
			        }
			        .tab-button:hover { color: #fff; background: #2e2e2e; }
			        .tab-button.active {
			            color: #3498db;
			            background: #1a1a1a;
			            border-bottom: 2px solid #3498db;
			        }
			        .tab-content {
			            display: none;
			            height: 382px;
			            box-sizing: border-box;
			        }
			        .tab-content.active {
			            display: flex;
			            flex-direction: column;
			        }
			
			        /* CONSOLE STYLE */
			        .output-panel {
			            background: #000000;
			            padding: 15px;
			            height: 100%;
			            display: flex;
			            flex-direction: column;
			            border-bottom-left-radius: 5px;
			            border-bottom-right-radius: 5px;
			            width: 100%;
			            overflow: hidden;
			        }
			        .output-header {
			            display: flex;
			            justify-content: space-between;
			            align-items: center;
			            color: #888;
			            font-size: 12px;
			            margin-bottom: 8px;
			            border-bottom: 1px solid #222;
			            padding-bottom: 5px;
			            gap: 10px;
			        }
			        .header-actions { display: flex; gap: 12px; align-items: center; white-space: nowrap; }
			        .action-link { cursor: pointer; font-weight: bold; }
			        .action-link:hover { text-decoration: underline; }
			
			        .output-log {
			            flex: 1;
			            overflow-y: auto !important;
			            overflow-x: hidden !important; 
			            font-family: 'Courier New', Courier, monospace;
			            font-size: 13px;
			            line-height: 1.5;
			        }
			        .log-item { 
			            margin-bottom: 6px; 
			            color: #ffffff; 
			            padding: 2px 5px;
			            white-space: pre-wrap !important;
			            word-wrap: break-word !important;
			            word-break: break-all !important;
			        }
			        .log-item span {
			            white-space: pre-wrap !important;
			            word-wrap: break-word !important;
			            word-break: break-all !important;
			        }
			        .log-item.log-error { color: #ff6b6b; background: rgba(255,107,107,0.1); border-radius: 3px; }
			        .log-item.log-info { color: #5bc0de; }
			        .log-item.log-return { color: #f1c40f; font-weight: bold; }
			
			        /* INSPECT PANEL */
			        .inspect-panel {
			            background: #111;
			            height: 100%;
			            display: flex;
			            flex-direction: column;
			            position: relative;
			        }
			        #preview-iframe {
			            width: 100%;
			            flex: 1;
			            border: none;
			            background: #fff;
			        }
			        #info-bar {
			            background-color: #222;
			            color: #3498db;
			            padding: 8px 12px;
			            font-family: monospace;
			            font-size: 13px;
			            border-top: 1px solid #333;
			            min-height: 35px;
			            display: flex;
			            justify-content: space-between;
			            align-items: center;
			            gap: 10px;
			            overflow-x: auto;
			        }
			
			        body.fullscreen-mode h2,
			        body.fullscreen-mode .url-bar,
			        body.fullscreen-mode .top-layout,
			        body.fullscreen-mode .bottom-layout,
			        body.fullscreen-mode .tab-headers { display: none !important; }
			        body.fullscreen-mode #tab-console-content {
			            position: fixed !important; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 9998;
			        }
			
			        /* --- CHẾ ĐỘ FULLSCREEN CHO INSPECTOR --- */
			        body.inspect-fullscreen-mode h2,
			        body.inspect-fullscreen-mode .url-bar,
			        body.inspect-fullscreen-mode #panel-javascript,
			        body.inspect-fullscreen-mode .top-layout .panel:first-child,
			        body.inspect-fullscreen-mode .bottom-layout,
			        body.inspect-fullscreen-mode .tab-headers,#info-bar { display: none !important; }
			
			        body.inspect-fullscreen-mode .top-layout { margin-bottom: 0; gap: 0; }
			        body.inspect-fullscreen-mode .tab-container { border: none !important; }
			
			        body.inspect-fullscreen-mode #tab-inspect-content {
			            position: fixed !important;
			            top: 0; left: 0;
			            width: 100vw; 
			            height: calc(100vh - 150px) !important;
			            z-index: 9990;
			            transition: height 0.2s ease-in-out;
			        }
			
			        /* --- CẤU HÌNH BAN ĐẦU KHI THU GỌN (Cao 180px, khung code cao 120px) --- */
			        body.inspect-fullscreen-mode #panel-extracted {
			            display: flex !important;
			            position: fixed !important;
			            bottom: 0 !important;
			            left: 0 !important;
			            width: 100vw !important;
			            height: 180px !important;
			            z-index: 9999;
			            background: rgba(20, 20, 20, 0.98);
			            border: none;
			            border-top: 3px solid #3498db;
			            border-radius: 0px;
			            padding: 10px 15px;
			            box-shadow: 0px -5px 25px rgba(0,0,0,0.8);
			            transition: height 0.25s ease-in-out; /* Tạo hiệu ứng chuyển động mượt mà khi tăng/giảm chiều cao */
			        }
			        body.inspect-fullscreen-mode #panel-extracted .panel-title {
			            display: flex;
			            justify-content: space-between;
			            align-items: center;
			            margin-bottom: 6px;
			        }
			        body.inspect-fullscreen-mode .code-display-wrapper {
			            width: 100%;
			            height: 120px !important;
			            max-height: 120px !important;
			            background-color: #0d0d0d;
			            transition: height 0.25s ease-in-out, max-height 0.25s ease-in-out; /* Hiệu ứng mượt cho khung code */
			        }
			
			        /* --- KHI DI CHUỘT VÀO: BUNG RỘNG RA (Cao 450px, khung code tự tăng lên 390px) --- */
			        body.inspect-fullscreen-mode #panel-extracted.expanded {
			            height: 450px !important;
			        }
			        body.inspect-fullscreen-mode #panel-extracted.expanded .code-display-wrapper {
			            height: 390px !important;
			            max-height: 390px !important;
			        }
			        
			        /* CSS ĐIỀU KHIỂN KHUNG TRÍCH XUẤT KHI BUNG MAX TOÀN MÀN HÌNH */
			        body.inspect-fullscreen-mode #panel-extracted.expanded-max {
			            height: calc(100vh - 40px) !important; /* Chiếm gần hết màn hình, chừa 40px cho iframe bên dưới */
			        }
			        body.inspect-fullscreen-mode #panel-extracted.expanded-max .code-display-wrapper {
			            height: calc(100vh - 95px) !important;
			            max-height: calc(100vh - 95px) !important;
			        }
			        body.inspect-fullscreen-mode.expanded-max-active #tab-inspect-content {
			            height: 40px !important; /* Co nhỏ iframe lên góc đầu */
			        }
			        
			        /* Thiết kế nút mở rộng nhỏ ở góc phải */
			        .btn-expand-trigger {
			            background: #34495e;
			            color: #fff;
			            border: none;
			            padding: 2px 7px;
			            font-size: 11px;
			            border-radius: 3px;
			            cursor: pointer;
			            font-weight: bold;
			            margin-right: 5px;
			        }
			        .btn-expand-trigger:hover { background: #4e6a85; }
			
			        #btnExitInspectFullscreen { display: none; }
			        body.inspect-fullscreen-mode #btnExitInspectFullscreen { display: inline-block; }
			        #sandbox { display: none; }
					#panel-javascript, #jsInput {
						height: 320px;
					}
			
					::-webkit-scrollbar {
						width: 8px;
						height: 8px;
					}
					::-webkit-scrollbar-track {
						background: #151515;
					}
					::-webkit-scrollbar-thumb {
						background: #444;
						border-radius: 4px;
					}
					::-webkit-scrollbar-thumb:hover {
						background: #555;
					}
			
					@media (max-width: 1000px) {
						.top-layout {
							flex-direction: column;
						}
						#panel-javascript {
							height: auto !important;
						}
						#jsInput {
							height: 150px !important; 
						}
						.tab-content {
							height: 300px; 
						}
					}
		</style>
	</head>

	<body>
		<div class="url-bar"> <input type="text" id="urlInput" value="https://greenxh.today/categories/vietnamese" placeholder="Nhập đường dẫn website..."> <button class="btn btn-primary" id="btnFetch">Tải Source HTML</button> </div>
		
		<div class="top-layout">
			<div class="panel" id="panel-javascript">
				<div class="panel-header-wrapper">
					<div class="panel-title">Mã JavaScript (Auto-Format JSON Return)</div>
					<div class="panel-actions">
						<button class="mini-action-btn" id="btnCopyJs">Sao chép</button>
						<button class="mini-action-btn" id="btnClearJs">Xóa</button>
					</div>
				</div>
				<textarea id="jsInput" autocapitalize="none" autocorrect="off" spellcheck="false" placeholder="// Viết hoặc dán mã JS..."></textarea> 
				<div class="js-controls" id="jsControlsBlock"> 
					<button class="btn btn-success" id="btnRunAll">Chạy toàn bộ JS</button> 
					<select id="functionSelect"> <option value="">-- Chọn hàm cụ thể --</option> </select> 
					<input type="text" id="paramInput" class="param-input-style" placeholder="Tham số: a, b..." style="display:none;">
					<button class="btn btn-primary" id="btnRunFunc" disabled="">Chạy hàm</button> 
				</div>
			</div>

			<div class="tab-container">
				<div class="tab-headers">
					<div class="tab-buttons-group">
						<button class="tab-button active" data-tab="console">[ CONSOLE MODE ]</button>
						<button class="tab-button" data-tab="inspect">[ INSPECT ELEMENT ]</button>
					</div>
					<button class="tab-button btn btn-primary" style="padding: 6px 12px; height: auto; margin-left: 5px;" id="btnEnterInspectFullscreen">Fullscreen</button>
				</div>
				
				<div id="tab-console-content" class="tab-content active">
					<div class="output-panel">
						<div class="output-header"> 
							<span>CONSOLE OUTPUT (Mới ở trên)</span> 
							<div class="header-actions"> 
								<button class="mini-action-btn" id="btnCopyConsole">Sao chép</button>
								<span class="action-link" style="color: #3498db;" id="btnToggleFullscreen">[Toàn màn hình]</span> 
								<span class="action-link" style="color: #ff6b6b;" id="btnClearConsole">[Xóa]</span> 
							</div>
						</div>
						<div class="output-log" id="consoleLog"></div>
					</div>
				</div>

				<div id="tab-inspect-content" class="tab-content">
					<div class="inspect-panel">
						<iframe id="preview-iframe" sandbox="allow-same-origin"></iframe>
						<div id="info-bar">
							<span id="info-bar-text"></span>
							<button class="btn btn-primary" style="padding: 4px 10px; font-size: 12px;" id="btnEnterInspectFullscreenInner">Fullscreen</button>
						</div>
					</div>
				</div>
			</div>
		</div>

		<div class="bottom-layout">
			<div class="panel" id="panel-extracted">
				<div class="panel-title">
					<span style="color: #2ecc71; font-weight: bold;">[Inject Extracted HTML - Đã trích xuất trực tiếp]</span>
					<div>
						<button class="btn-expand-trigger" id="btnToggleMaxHeight">↕ </button>
						<button class="btn btn-success" style="padding: 4px 12px; font-size: 12px; margin-right: 5px;" id="btnExtractMeta">Meta</button>
						<button class="btn btn-danger" style="padding: 4px 12px; font-size: 12px;" id="btnExitInspectFullscreen">Thoát</button>
					</div>
				</div>
				<div class="code-display-wrapper" id="extractedCodeOutput"></div>
			</div>
			
			<div class="panel">
				<div class="panel-header-wrapper">
					<div class="panel-title">Mã nguồn HTML (Vùng Sandbox &amp; Inspector)</div>
					<div class="panel-actions">
						<button class="mini-action-btn" id="btnCopyHtml">Sao chép</button>
						<button class="mini-action-btn" id="btnClearHtml">Xóa</button>
					</div>
				</div> 
				<textarea id="htmlInput" autocapitalize="none" autocorrect="off" spellcheck="false" placeholder="Mã nguồn HTML..."></textarea>
			</div>
		</div>

		<div id="sandbox"></div>

		<script>
		$(document).ready(function() {
    const $htmlInput = $('#htmlInput');
    const $jsInput = $('#jsInput');
    const $consoleLog = $('#consoleLog');
    const $functionSelect = $('#functionSelect');
    const $paramInput = $('#paramInput');
    const $btnRunFunc = $('#btnRunFunc');
    const $sandbox = $('#sandbox');
    const $jsControlsBlock = $('#jsControlsBlock');
    
    const $iframe = $('#preview-iframe');
    const $infoBarText = $('#info-bar-text');
    const $panelJavaScript = $('#panel-javascript');
    const $panelExtracted = $('#panel-extracted');
    const $extractedCodeOutput = $('#extractedCodeOutput');

    const GOOGLE_SCRIPT_PROXY = "https://script.google.com/macros/s/AKfycbwGOhlYMORQ0Rv45F54tfYgTfbLHeYQ04ulpQ5f6nMqV2Y_OgD9GGpTLSV4oGDCtGF70A/exec";
    const STORAGE_KEY = "html_lab_source_backup";
    const JS_STORAGE_KEY = "html_lab_js_backup";

    $('head').append(`
        <style>
            .tree-node { font-family: 'Courier New', monospace; font-size: 13px; line-height: 1.5; margin-left: 14px; position: relative; }
            .tree-toggle { cursor: pointer; color: #666; display: inline-block; width: 12px; margin-left: -12px; user-select: none; font-size: 10px; transition: transform 0.1s; }
            .tree-toggle.collapsed { transform: rotate(-90deg); }
            .tree-children { display: block; }
            .tree-children.hidden { display: none; }
            .tree-leaf { margin-left: 14px; }
            
            .html-bracket { color: #808080; }
            .html-tag { color: #5db0d7; }
            .html-attr { color: #9bbbdc; }
            .html-val { color: #f29766; }
            .html-text { color: #ffffff; }
            .html-comment { color: #747474; font-style: italic; }
            
            .obj-key { color: #b76bcf; font-weight: bold; }
            .obj-collapse-summary { color: #aaa; font-style: italic; cursor: pointer; }
        </style>
    `);

    const highlightStyle = `
        <style id="inspect-style">
            *:hover { outline: 1px dashed red !important; background-color: rgba(255, 0, 0, 0.05) !important; cursor: pointer !important; }
        </style>
    `;

    let savedHtml = localStorage.getItem(STORAGE_KEY);
    if (savedHtml) { $htmlInput.val(savedHtml); }
    
    let savedJs = localStorage.getItem(JS_STORAGE_KEY);
    if (savedJs) { $jsInput.val(savedJs); $jsInput.trigger('input'); }

    function syncGlobalAndIframe() { 
        let htmlContent = $htmlInput.val();
        window.html = htmlContent; 
        $iframe.attr('srcdoc', htmlContent + highlightStyle);
        localStorage.setItem(STORAGE_KEY, htmlContent);
    }
    
    $htmlInput.on('input blur change', syncGlobalAndIframe);
    syncGlobalAndIframe();
    
    $jsInput.on('input blur change', function() {
        localStorage.setItem(JS_STORAGE_KEY, $(this).val());
    });

    $('.tab-button').click(function() {
        let tabId = $(this).data('tab');
        if(!tabId) return;
        $('.tab-button').removeClass('active');
        $('.tab-content').removeClass('active');
        
        $(this).addClass('active');
        $(`#tab-${tabId}-content`).addClass('active');
        
        if (tabId === 'console') {
            if(!$('body').hasClass('inspect-fullscreen-mode')) $panelExtracted.hide();
        } else if (tabId === 'inspect') {
            $panelExtracted.show();
        }
    });

    function escapeHtmlText(str) {
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
    }

    // --- HÀM TẠO CÂY ĐỐI TƯỢNG (OBJECT TREE VIEW) CHO CONSOLE ---
    function renderObjectToTree(obj, keyName = null) {
        let $container = $('<div>').addClass('tree-node');
        let label = keyName ? `<span class="obj-key">${keyName}</span>: ` : '';

        if (obj === null) return $container.html(`${label}<span class="html-val">null</span>`);
if (typeof obj !== 'object') {
	let valClass = typeof obj === 'string' ? 'html-val' : 'html-tag';

    // --- HÀM TẠO CÂY HTML (DOM TREE VIEW) CHO INSPECT ELEMENT ---
    function renderDomToTree(node) {
        let $container = $('<div>').addClass('tree-node');

        if (node.nodeType === 8) { // Comment node
            return $container.addClass('tree-leaf').html(`<span class="html-comment">&lt;!--${escapeHtmlText(node.nodeValue)}--&gt;</span>`);
        }
        if (node.nodeType === 3) { // Text node
            let text = node.nodeValue.trim();
            if (!text) return null;
            return $container.addClass('tree-leaf').html(`<span class="html-text">${escapeHtmlText(text)}</span>`);
        }

        if (node.nodeType === 1) { // Element node
            let tagName = node.tagName.toLowerCase();
            if (tagName === 'style' && node.id === 'inspect-style') return null;

            let attrStr = '';
            if (node.attributes) {
                for (let i = 0; i < node.attributes.length; i++) {
                    let attr = node.attributes[i];
                    attrStr += ` <span class="html-attr">${attr.name}</span><span class="html-bracket">=</span><span class="html-bracket">"</span><span class="html-val">${escapeHtmlText(attr.value)}</span><span class="html-bracket">"</span>`;
                }
            }

            const selfClosingTags = ['area', 'base', 'br', 'col', 'embed', 'hr', 'img', 'input', 'link', 'meta', 'param', 'source', 'track', 'wbr'];
            if (selfClosingTags.includes(tagName)) {
                return $container.addClass('tree-leaf').html(`<span class="html-bracket">&lt;</span><span class="html-tag">${tagName}</span>${attrStr}<span class="html-bracket">/&gt;</span>`);
            }

            let $toggle = $('<span>').addClass('tree-toggle').html('▼');
            let $openTag = $('<span>').html(`<span class="html-bracket">&lt;</span><span class="html-tag">${tagName}</span>${attrStr}<span class="html-bracket">&gt;</span>`);
            let $closeTag = $('<span>').html(`<span class="html-bracket">&lt;/</span><span class="html-tag">${tagName}</span><span class="html-bracket">&gt;</span>`);
            let $children = $('<div>').addClass('tree-children');

            let hasValidChildren = false;
            node.childNodes.forEach(child => {
                let $childNode = renderDomToTree(child);
                if ($childNode) {
                    $children.append($childNode);
                    hasValidChildren = true;
                }
            });

            $container.data('raw-html', node.outerHTML);

            if (!hasValidChildren) {
                return $container.addClass('tree-leaf').html(`<span class="html-bracket">&lt;</span><span class="html-tag">${tagName}</span>${attrStr}<span class="html-bracket">&gt;</span><span class="html-bracket">&lt;/</span><span class="html-tag">${tagName}</span><span class="html-bracket">&gt;</span>`);
            }

            $toggle.on('click', function(e) {
                e.stopPropagation();
                $(this).toggleClass('collapsed').html($(this).hasClass('collapsed') ? '▶' : '▼');
                $children.toggleClass('hidden');
            });

            return $container.append($toggle).append($openTag).append($children).append($closeTag);
        }
        return null;
    }

   function logToConsole(message, type = 'log') {
    let extraClass = '';
    if (type === 'error') extraClass = 'log-error';
    if (type === 'info') extraClass = 'log-info';
    if (type === 'return') extraClass = 'log-return';

    let headerPrefix = type === 'return' ? `👉 [Return] ` : ``;
    let $logItem = $('<div>').addClass('log-item').addClass(extraClass);
    
    if (headerPrefix) {
        $logItem.append($('<span>').text(headerPrefix));
    }

    // TỰ ĐỘNG DỰNG CÂY OBJECT NẾU LÀ ĐỐI TƯỢNG (OBJECT, JQUERY, ARRAY, DOM)
    if (typeof message === 'object' && message !== null) {
        $logItem.append(renderObjectToTree(message));
    } else {
        // Định dạng chuỗi JSON thô nếu chuỗi nhập vào dạng cấu trúc {} hoặc []
        let formattedMessage = message;
        if (typeof message === 'string') {
            let trimmed = message.trim();
            if ((trimmed.startsWith('{') && trimmed.endsWith('}')) || (trimmed.startsWith('[') && trimmed.endsWith(']'))) {
                try { parsed = JSON.parse(message); formattedMessage = JSON.stringify(parsed, null, 4); } catch (e) {}
            }
        }
        $logItem.append($('<span>').text(formattedMessage));
    }
    
    $consoleLog.prepend($logItem);
    $consoleLog.scrollTop(0);

    // === NÂNG CẤP: LƯU TOÀN BỘ HTML CONSOLE VÀO LOCALSTORAGE NGAY KHI CÓ THAY ĐỔI ===
    localStorage.setItem('console_logs_html', $consoleLog.html());

    // --- HIỆU ỨNG NHẬP NHÁY THÔNG BÁO LOG MỚI ---
    let $consoleTab = $('.tab-button[data-tab="console"]');
    let $outputPanel = $('.output-panel');

    $consoleTab.css('transition', 'all 0.15s ease-in-out');
    $outputPanel.css('transition', 'box-shadow 0.15s ease-in-out, background-color 0.15s ease-in-out');

    $consoleTab.css({'background-color': '#1a365d', 'color': '#3498db'});
    $outputPanel.css({
        'background-color': '#050c14',
        'box-shadow': 'inset 0 0 15px rgba(52, 152, 219, 0.4)'
    });

    setTimeout(function() {
        $consoleTab.css('background-color', '');
        if (!$consoleTab.hasClass('active')) {
            $consoleTab.css('color', '#888');
        } else {
            $consoleTab.css('color', '#3498db');
        }

        $outputPanel.css({
            'background-color': '#000000',
            'box-shadow': 'none'
        });
    }, 250);
}

                set: function(val) { logToConsole(`[Bảo vệ] Đã chặn mã JS cố gắng chuyển hướng tới: ${val}`, 'error'); },

    $jsInput.on('input blur', function() {
        let jsCode = $(this).val();
        let funcRegex = /(?:function\s+([a-zA-Z0-9_$]+)\s*\(([^)]*)\)|(?:const|let|var)\s+([a-zA-Z0-9_$]+)\s*=\s*(?:function\s*\(([^)]*)\)|\(([^)]*)\)\s*=>))/g;
        let match, functions = [];
        while ((match = funcRegex.exec(jsCode)) !== null) {
            let funcName = match[1] || match[3];
            let params = match[2] || match[4] || match[5] || '';
            if (funcName) functions.push({ name: funcName, params: params.trim() });
        }
        
        let currentSelected = $functionSelect.val();
        $functionSelect.html('<option value="">-- Chọn hàm cụ thể --</option>');
        if (functions.length > 0) {
            functions.forEach(f => { 
                $functionSelect.append(`<option value="${f.name}" data-params="${f.params}">${f.name}(${f.params})</option>`); 
            });
        }
        
        let exists = false;
        functions.forEach(f => { if(f.name === currentSelected) exists = true; });
        if (exists) $functionSelect.val(currentSelected);
        $functionSelect.trigger('change');
    });

function executeEngine(runMode) {
	$('.tab-button[data-tab="console"]').trigger('click');
	let htmlCode = $htmlInput.val();
	if (htmlCode) {
		let $cleanHtml = $('<div>').html(htmlCode);
		$cleanHtml.find('script').remove();
		$sandbox.html($cleanHtml.html());
	} else { $sandbox.empty(); }
	
	lockDownRedirects();
	let jsCode = $jsInput.val();
	localStorage.setItem(JS_STORAGE_KEY, jsCode);
	
	window.console.log = function(...args) {
		logToConsole(args.length > 1 ? args : args[0]);
		nativeLog.apply(console, args);
	};
	window.console.error = function(...args) {
		logToConsole(args.length > 1 ? args : args[0], 'error');
		nativeError.apply(console, args);
	};
	
	let executeCode = '';
	if (runMode === 'single') {
		let selectedFunc = $functionSelect.val();
		let customParamsValue = $paramInput.val().trim();
		logToConsole(`--- Bắt đầu chạy hàm: ${selectedFunc}(${customParamsValue}) ---`, 'info');
		executeCode = `${jsCode}\n;try { let result = ${selectedFunc}(${customParamsValue}); if(result !== undefined) console.info(result); } catch(err) { console.error(err.message); }`;
	} else {
		// Đã lược bỏ dòng log tiêu đề cũ theo ý bạn
		let lines = jsCode.trim().split('\n');
		if (lines.length > 0) {
			let lastLine = lines[lines.length - 1].trim();
			
			// --- ĐÃ SỬA: Nới lỏng điều kiện kiểm tra biến ở dòng cuối ---
			let isStructural = lastLine.endsWith(';') ||
				lastLine.endsWith('}') ||
				lastLine.startsWith('if') ||
				lastLine.startsWith('for') ||
				lastLine.startsWith('while') ||
				lastLine.startsWith('//') ||
				lastLine.startsWith('/*');
			
			if (lastLine && !isStructural) {
				// Tự động bọc dòng cuối lại để in kết quả ra Console
				lines[lines.length - 1] = `try { let __repl_res = (${lastLine}); if(__repl_res !== undefined) console.info(__repl_res); } catch(e) { ${lastLine} }`;
				executeCode = lines.join('\n');
			} else {
				executeCode = jsCode;
			}
		} else {
			executeCode = jsCode;
		}
	}
	
	try {
		let interceptorJs = `
                (function($, jQuery){
                    var html = window.html;
                    console.info = function(msg) { window.customLogReturn(msg); };
                    ${executeCode}
                })(function(selector, context){ 
                    return jQuery(selector, context || '#sandbox'); 
                }, function(selector, context){ 
                    return jQuery(selector, context || '#sandbox'); 
                });
            `;
		window.customLogReturn = function(val) { logToConsole(val, 'return'); };
		window.eval(interceptorJs);
	} catch (error) { logToConsole(error.name + ': ' + error.message, 'error'); }
}

		$infoBarText.html(savedInfoText || "");
		$(".panel-title span").html(savedInfoText || "");
		$extractedCodeOutput.html(savedTreeHtml);
		
		if (savedRawHtml) {
			$extractedCodeOutput.children('.tree-node').first().data('raw-html', savedRawHtml);
		}
		
		// Gắn lại sự kiện toggle cho khung trích xuất element
		$extractedCodeOutput.find('.tree-toggle').off('click').on('click', function(e) {
			e.stopPropagation();
			$(this).toggleClass('collapsed').html($(this).hasClass('collapsed') ? '▶' : '▼');
			$(this).siblings('.tree-children').toggleClass('hidden');
		});
	}
}, 100);

			
    $('#btnExtractMeta').on('click', function() {
        let htmlContent = $htmlInput.val();
        if (!htmlContent) {
            logToConsole("Không có dữ liệu HTML để trích xuất Meta!", "error");
            return;
        }

        let $tempDom = $('<div>').html(htmlContent);
        let $metaAndLinks = $tempDom.find('meta, link');

        if ($metaAndLinks.length === 0) {
            $extractedCodeOutput.html('<div style="color: #888; font-style: italic; padding: 10px;">Không tìm thấy thẻ &lt;meta&gt; hoặc &lt;link&gt; nào.</div>');
            return;
        }

        $extractedCodeOutput.empty();
        $metaAndLinks.each(function() {
            let $treeNode = renderDomToTree(this);
            if ($treeNode) {
                $extractedCodeOutput.append($treeNode);
            }
        });

        //$infoBarText.html(`<strong>Đã trích xuất thành công:</strong> Tìm thấy <b>${$metaAndLinks.length}</b> thẻ Meta & Link.`);
        $extractedCodeOutput.scrollTop(0).scrollLeft(0);
    });
});
		</script>
	</body>
