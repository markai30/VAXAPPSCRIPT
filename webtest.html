<!DOCTYPE html>
<html lang="vi">

	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>JavaScript &amp; HTML Interactive Lab (Optimized Layout)</title>
		<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
		<style>
			* {
			            box-sizing: border-box;
			            margin: 0;
			            padding: 0;
			            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
			        }
			        body {
			            background-color: #121212;
			            color: #e0e0e0;
			            padding: 15px;
			            display: flex;
			            flex-direction: column;
			            min-height: 100vh;
			            gap: 15px;
			        }
			        h2 {
			            font-size: 20px;
			            color: #fff;
			        }
			        .url-bar {
			            display: flex;
			            gap: 10px;
			            background: #1e1e1e;
			            padding: 10px;
			            border-radius: 6px;
			        }
			        .url-bar input {
			            flex: 1;
			            padding: 10px 12px;
			            border: 1px solid #333;
			            background-color: #2a2a2a;
			            color: #fff;
			            border-radius: 4px;
			            font-size: 14px;
			        }
			        .btn {
			            padding: 10px 16px;
			            border: none;
			            border-radius: 4px;
			            cursor: pointer;
			            font-weight: bold;
			            transition: background 0.2s, transform 0.1s;
			            white-space: nowrap;
			        }
			        .btn:active { transform: scale(0.98); }
			        .btn-primary { background-color: #3498db; color: white; }
			        .btn-success { background-color: #2ecc71; color: white; }
			        .btn-secondary { background-color: #444; color: #fff; }
			        .btn-secondary:hover { background-color: #555; }
			        .btn-danger { background-color: #e74c3c; color: white; }
			
			        /* LAYOUT HÀNG TRÊN: CHỨA JS CODE VÀ CONSOLE OUTPUT SÁT NHAU */
			        .top-layout {
			            display: flex;
			            gap: 15px;
			        }
			        @media (max-width: 768px) {
			            .top-layout { flex-direction: column; }
			        }
			        .panel {
			            flex: 1;
			            display: flex;
			            flex-direction: column;
			            background: #1e1e1e;
			            border-radius: 6px;
			            padding: 15px;
			        }
			        .panel-title {
			            font-weight: bold;
			            margin-bottom: 10px;
			            color: #bbb;
			            font-size: 14px;
			        }
			        textarea {
			            width: 100%;
			            height: 320px;
			            resize: vertical;
			            padding: 10px;
			            font-family: 'Courier New', Courier, monospace;
			            font-size: 13px;
			            border: 1px solid #333;
			            border-radius: 4px;
			            background-color: #252525;
			            color: #fff;
			        }
			
			        /* LAYOUT HÀNG DƯỚI: FULL WIDTH CHO HTML SOURCE */
			        .bottom-layout {
			            display: flex;
			            flex-direction: column;
			            gap: 15px;
			        }
			        .bottom-layout textarea {
			            height: 220px; /* Chiều cao vừa vặn cho vùng HTML phía dưới */
			        }
			
			        /* KHUNG HIỂN THỊ CODE CHUẨN ĐẦY ĐỦ CUỘN DỌC NGANG */
			        .code-display-wrapper {
			            width: 100%;
			            height: 220px;
			            max-height: 220px;
			            overflow: auto !important;
			            padding: 10px;
			            font-family: 'Courier New', Courier, monospace;
			            font-size: 13px;
			            border: 1px solid #333;
			            border-radius: 4px;
			            background-color: #151515;
			            color: #abb2bf;
			            white-space: pre !important;
			            word-wrap: normal !important;
			            word-break: keep-all !important;
			            line-height: 1.5;
			            tab-size: 4;
			            -moz-tab-size: 4;
			        }
			        
			        .html-tag { color: #e06c75; font-weight: bold; }
			        .html-bracket { color: #56b6c2; }
			        .html-attr { color: #d19a66; }
			        .html-val { color: #98c379; }
			        .html-text { color: #ffffff; }
			        
			        .js-controls {
			            margin-top: 10px;
			            display: flex;
			            gap: 10px;
			            align-items: center;
			            overflow-x: auto;
			            padding-bottom: 5px;
			        }
			
			        select {
			            padding: 10px;
			            border: 1px solid #333;
			            background-color: #2a2a2a;
			            color: #fff;
			            border-radius: 4px;
			            min-width: 150px;
			        }
			
			        #panel-extracted { display: none; }
			
			        /* --- SYSTEM TABS --- */
			        .tab-container {
			            flex: 1;
			            background: #1a1a1a;
			            border: 1px solid #333;
			            border-radius: 6px;
			            display: flex;
			            flex-direction: column;
			        }
			        .tab-headers {
			            display: flex;
			            background: #252525;
			            border-top-left-radius: 5px;
			            border-top-right-radius: 5px;
			            border-bottom: 1px solid #333;
			        }
			        .tab-button {
			            padding: 12px 20px;
			            background: none;
			            border: none;
			            color: #888;
			            font-weight: bold;
			            font-size: 13px;
			            cursor: pointer;
			            transition: all 0.2s;
			        }
			        .tab-button:hover { color: #fff; background: #2e2e2e; }
			        .tab-button.active {
			            color: #3498db;
			            background: #1a1a1a;
			            border-bottom: 2px solid #3498db;
			        }
			        .tab-content {
			            display: none;
			            height: 382px; /* Đồng bộ chiều cao với khung panel JS kế bên */
			            box-sizing: border-box;
			        }
			        .tab-content.active {
			            display: flex;
			            flex-direction: column;
			        }
			
			        /* CONSOLE STYLE */
			        .output-panel {
			            background: #000000;
			            padding: 15px;
			            height: 100%;
			            display: flex;
			            flex-direction: column;
			            border-bottom-left-radius: 5px;
			            border-bottom-right-radius: 5px;
			        }
			        .output-header {
			            display: flex;
			            justify-content: space-between;
			            align-items: center;
			            color: #888;
			            font-size: 12px;
			            margin-bottom: 8px;
			            border-bottom: 1px solid #222;
			            padding-bottom: 5px;
			        }
			        .header-actions { display: flex; gap: 15px; }
			        .action-link { cursor: pointer; font-weight: bold; }
			        .action-link:hover { text-decoration: underline; }
			
			        .output-log {
			            flex: 1;
			            overflow: auto;
			            font-family: 'Courier New', Courier, monospace;
			            font-size: 13px;
			            line-height: 1.5;
			            white-space: pre;
			        }
			        .log-item { margin-bottom: 6px; color: #ffffff; padding: 2px 5px; }
			        .log-item.log-error { color: #ff6b6b; background: rgba(255,107,107,0.1); border-radius: 3px; }
			        .log-item.log-info { color: #5bc0de; }
			        .log-item.log-return { color: #f1c40f; font-weight: bold; }
			
			        /* INSPECT PANEL */
			        .inspect-panel {
			            background: #111;
			            height: 100%;
			            display: flex;
			            flex-direction: column;
			            position: relative;
			        }
			        #preview-iframe {
			            width: 100%;
			            flex: 1;
			            border: none;
			            background: #fff;
			        }
			        #info-bar {
			            background-color: #222;
			            color: #3498db;
			            padding: 8px 12px;
			            font-family: monospace;
			            font-size: 13px;
			            border-top: 1px solid #333;
			            min-height: 35px;
			            display: flex;
			            justify-content: space-between;
			            align-items: center;
			        }
			
			        /* --- CHẾ ĐỘ TOÀN MÀN HÌNH CHO CONSOLE --- */
			        body.fullscreen-mode h2,
			        body.fullscreen-mode .url-bar,
			        body.fullscreen-mode .top-layout,
			        body.fullscreen-mode .bottom-layout,
			        body.fullscreen-mode .tab-headers { display: none !important; }
			        body.fullscreen-mode #tab-console-content {
			            position: fixed !important; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 9998;
			        }
			
			        /* --- CHẾ ĐỘ FULLSCREEN CHO INSPECTOR --- */
			        body.inspect-fullscreen-mode h2,
			        body.inspect-fullscreen-mode .url-bar,
			        body.inspect-fullscreen-mode #panel-javascript,
			        body.inspect-fullscreen-mode .top-layout .panel:first-child,
			        body.inspect-fullscreen-mode .bottom-layout,
			        body.inspect-fullscreen-mode .tab-headers { display: none !important; }
			
			        body.inspect-fullscreen-mode .top-layout { margin-bottom: 0; gap: 0; }
			        body.inspect-fullscreen-mode .tab-container { border: none !important; }
			
			        body.inspect-fullscreen-mode #tab-inspect-content {
			            position: fixed !important;
			            top: 0; left: 0;
			            width: 100vw; 
			            height: calc(100vh - 180px) !important;
			            z-index: 9990;
			        }
			
			        body.inspect-fullscreen-mode #panel-extracted {
			            display: flex !important;
			            position: fixed !important;
			            bottom: 0 !important;
			            left: 0 !important;
			            width: 100vw !important;
			            height: 180px !important;
			            z-index: 9999;
			            background: rgba(20, 20, 20, 0.98);
			            border: none;
			            border-top: 3px solid #3498db;
			            border-radius: 0px;
			            padding: 10px 15px;
			            box-shadow: 0px -5px 25px rgba(0,0,0,0.8);
			        }
			        body.inspect-fullscreen-mode #panel-extracted .panel-title {
			            display: flex;
			            justify-content: space-between;
			            align-items: center;
			            margin-bottom: 6px;
			        }
			        body.inspect-fullscreen-mode .code-display-wrapper {
						width:100%;
			            height: 120px !important;
			            max-height: 120px !important;
			            background-color: #0d0d0d;
			        }
			        
			        #btnExitInspectFullscreen { display: none; }
			        body.inspect-fullscreen-mode #btnExitInspectFullscreen { display: inline-block; }
			        #sandbox { display: none; }
		</style>
	</head>

	<body>
		<div class="url-bar"> <input type="text" id="urlInput" value="https://greenxh.today/categories/vietnamese" placeholder="Nhập đường dẫn website..."> <button class="btn btn-primary" id="btnFetch">Tải Source HTML</button> </div>
		
		<div class="top-layout">
			<div class="panel" id="panel-javascript">
				<div class="panel-title">Mã JavaScript (Auto-Format JSON Return)</div> <textarea id="jsInput" autocapitalize="none" autocorrect="off" spellcheck="false" placeholder="// Viết hoặc dán mã JS..."></textarea> <div class="js-controls" id="jsControlsBlock"> <button class="btn btn-success" id="btnRunAll">Chạy toàn bộ JS</button> <select id="functionSelect"> <option value="">-- Chọn hàm cụ thể --</option> </select> <button class="btn btn-primary" id="btnRunFunc" disabled="">Chạy hàm</button> <button class="btn btn-secondary" id="btnClearConsoleBtn">Xóa Log</button> </div>
			</div>

			<div class="tab-container">
				<div class="tab-headers">
					<button class="tab-button active" data-tab="console">[ CONSOLE MODE ]</button>
					<button class="tab-button" data-tab="inspect">[ INSPECT ELEMENT ]</button>
				</div>
				
				<div id="tab-console-content" class="tab-content active">
					<div class="output-panel">
						<div class="output-header"> <span>CONSOLE OUTPUT (Mới ở trên)</span> <div class="header-actions"> <span class="action-link" style="color: #3498db;" id="btnToggleFullscreen">[Toàn màn hình]</span> <span class="action-link" style="color: #ff6b6b;" id="btnClearConsole">[Xóa]</span> </div>
						</div>
						<div class="output-log" id="consoleLog"></div>
					</div>
				</div>

				<div id="tab-inspect-content" class="tab-content">
					<div class="inspect-panel">
						<iframe id="preview-iframe" sandbox="allow-same-origin"></iframe>
						<div id="info-bar">
							<span id="info-bar-text">CLICK CHUỘT PHẢI trực tiếp vào phần tử để trích xuất.</span>
							<button class="btn btn-primary" style="padding: 4px 10px; font-size: 12px;" id="btnEnterInspectFullscreen">Fullscreen Inspect</button>
						</div>
					</div>
				</div>
			</div>
		</div>

		<div class="bottom-layout">
			<div class="panel">
				<div class="panel-title">Mã nguồn HTML (Vùng Sandbox &amp; Inspector)</div> <textarea id="htmlInput" autocapitalize="none" autocorrect="off" spellcheck="false" placeholder="Mã nguồn HTML..."></textarea> </div>

			<div class="panel" id="panel-extracted">
				<div class="panel-title">
					<span style="color: #2ecc71; font-weight: bold;">[Inject Extracted HTML - Đã trích xuất trực tiếp]</span>
					<button class="btn btn-danger" style="padding: 4px 12px; font-size: 12px;" id="btnExitInspectFullscreen">Thoát Fullscreen</button>
				</div>
				<div class="code-display-wrapper" id="extractedCodeOutput">Kết quả trích xuất dạng phân cấp sẽ xuất hiện ở đây...</div>
			</div>
		</div>

		<div id="sandbox"></div>

		<script>
			$(document).ready(function() {
			            const $htmlInput = $('#htmlInput');
			            const $jsInput = $('#jsInput');
			            const $consoleLog = $('#consoleLog');
			            const $functionSelect = $('#functionSelect');
			            const $btnRunFunc = $('#btnRunFunc');
			            const $sandbox = $('#sandbox');
			            const $jsControlsBlock = $('#jsControlsBlock');
			            
			            const $iframe = $('#preview-iframe');
			            const $infoBarText = $('#info-bar-text');
			            const $panelJavaScript = $('#panel-javascript');
			            const $panelExtracted = $('#panel-extracted');
			            const $extractedCodeOutput = $('#extractedCodeOutput');
			
			            const GOOGLE_SCRIPT_PROXY = "https://script.google.com/macros/s/AKfycbwGOhlYMORQ0Rv45F54tfYgTfbLHeYQ04ulpQ5f6nMqV2Y_OgD9GGpTLSV4oGDCtGF70A/exec";
			            const STORAGE_KEY = "html_lab_source_backup";
			
			            const highlightStyle = `
			                <style id="inspect-style">
			                    *:hover {
			                        outline: 1px dashed red !important;
			                        background-color: rgba(255, 0, 0, 0.05) !important;
			                        cursor: pointer !important;
			                    }
			                </style>
			            `;
			
			            let savedHtml = localStorage.getItem(STORAGE_KEY);
			            if (savedHtml) { $htmlInput.val(savedHtml); }
			
			            function syncGlobalAndIframe() { 
			                let htmlContent = $htmlInput.val();
			                window.html = htmlContent; 
			                $iframe.attr('srcdoc', htmlContent + highlightStyle);
			                localStorage.setItem(STORAGE_KEY, htmlContent);
			            }
			            
			            $htmlInput.on('input blur change', syncGlobalAndIframe);
			            syncGlobalAndIframe();
			
			            // CHUYỂN TAB GIAO DIỆN
			            $('.tab-button').click(function() {
			                let tabId = $(this).data('tab');
			                $('.tab-button').removeClass('active');
			                $('.tab-content').removeClass('active');
			                
			                $(this).addClass('active');
			                $(`#tab-${tabId}-content`).addClass('active');
			                
			                if (tabId === 'console') {
			                    if(!$('body').hasClass('inspect-fullscreen-mode')) {
			                        $panelExtracted.hide();
			                    }
			                } else if (tabId === 'inspect') {
			                    $panelExtracted.show();
			                }
			            });
			
			            function escapeHtmlText(str) {
			                return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
			            }
			
			            function isInlineTextOnlyNode(node) {
			                if (!node.childNodes || node.childNodes.length === 0) return true;
			                let blockTags = ['div', 'p', 'section', 'ul', 'li', 'ol', 'article', 'h1', 'h2', 'h3', 'h4', 'h5', 'h6', 'form', 'nav', 'header', 'footer', 'aside'];
			                if (node.tagName && blockTags.includes(node.tagName.toLowerCase())) return false;
			                let hasBlockElement = false;
			                node.childNodes.forEach(child => {
			                    if (child.nodeType === 1 && blockTags.includes(child.tagName.toLowerCase())) {
			                        hasBlockElement = true;
			                    }
			                });
			                return !hasBlockElement;
			            }
			
			            function parseDomToHighlightedHtml(node, depth = 0, isInlineContext = false) {
			                let indent = isInlineContext ? "" : " ".repeat(depth * 4);
			                if (node.nodeType === 8) return "";
			                
			                if (node.nodeType === 3) {
			                    let text = node.nodeValue.trim();
			                    if (!text) return ""; 
			                    let cleanText = text.replace(/\s+/g, ' ');
			                    if (cleanText === ',' || cleanText === '/' || cleanText === '|' || isInlineContext) {
			                        return `<span class="html-text">${escapeHtmlText(cleanText)}</span>`;
			                    }
			                    return indent + `<span class="html-text">${escapeHtmlText(cleanText)}</span>\n`;
			                }
			                
			                if (node.nodeType === 1) {
			                    let tagName = node.tagName.toLowerCase();
			                    if (tagName === 'style' && node.id === 'inspect-style') return ""; 
			                    
			                    let result = indent + `<span class="html-bracket">&lt;</span><span class="html-tag">${tagName}</span>`;
			                    if (node.attributes && node.attributes.length > 0) {
			                        for (let i = 0; i < node.attributes.length; i++) {
			                            let attr = node.attributes[i];
			                            result += ` <span class="html-attr">${attr.name}</span><span class="html-bracket">=</span><span class="html-val">"${escapeHtmlText(attr.value)}"</span>`;
			                        }
			                    }
			                    
			                    const selfClosingTags = ['area', 'base', 'br', 'col', 'embed', 'hr', 'img', 'input', 'link', 'meta', 'param', 'source', 'track', 'wbr'];
			                    if (selfClosingTags.includes(tagName)) {
			                        return result + `<span class="html-bracket">/&gt;</span>` + (isInlineContext ? "" : "\n");
			                    }
			                    
			                    result += `<span class="html-bracket">&gt;</span>`;
			                    let inlineTextOnly = isInlineTextOnlyNode(node);
			                    if (!inlineTextOnly && !isInlineContext) result += "\n";
			                    
			                    let childContent = "";
			                    node.childNodes.forEach(child => {
			                        childContent += parseDomToHighlightedHtml(child, inlineTextOnly ? 0 : depth + 1, inlineTextOnly);
			                    });
			                    
			                    if (inlineTextOnly) childContent = childContent.trim();
			                    result += childContent;
			                    
			                    let closeIndent = inlineTextOnly ? "" : " ".repeat(depth * 4);
			                    return result + closeIndent + `<span class="html-bracket">&lt;/</span><span class="html-tag">${tagName}</span><span class="html-bracket">&gt;</span>` + (isInlineContext ? "" : "\n");
			                }
			                return "";
			            }
			
			            $iframe.on('load', function() {
			                let iframeDoc = $iframe.contents();
			
			                iframeDoc.on('mouseover', '*', function(e) {
			                    e.stopPropagation();
			                    if (this.id === 'inspect-style') return;
			                    let tagName = this.tagName.toLowerCase();
			                    let id = this.id ? '#' + this.id : '';
			                    let className = this.className ? '.' + $.trim(this.className).replace(/\s+/g, '.') : '';
			                    $infoBarText.html(`Đang trỏ: <span style="color:#2ecc71; font-weight:bold">${tagName}${id}${className}</span>`);
			                });
			
			                iframeDoc.on('contextmenu', '*', function(e) {
			                    e.preventDefault();
			                    e.stopPropagation();
			                    
			                    let tagName = this.tagName.toLowerCase();
			                    $infoBarText.html(`<strong>Đã trích xuất:</strong> <code>&lt;${tagName}&gt;</code>`);
			
			                    let finalVisualHtml = parseDomToHighlightedHtml(this, 0, false);
			                    finalVisualHtml = finalVisualHtml.replace(/\n+$/, '');
			                    $extractedCodeOutput.html(finalVisualHtml);
			                    $extractedCodeOutput.scrollTop(0).scrollLeft(0);
			                });
			            });
			
			            // INSPECT FULLSCREEN LOGIC
			            $('#btnEnterInspectFullscreen').click(function() {
			                $('body').addClass('inspect-fullscreen-mode');
			                $panelExtracted.appendTo('body').show();
			            });
			
			            $('#btnExitInspectFullscreen').click(function() {
			                $('body').removeClass('inspect-fullscreen-mode');
			                $('.bottom-layout').append($panelExtracted);
			                if ($('.tab-button[data-tab="console"]').hasClass('active')) {
			                    $panelExtracted.hide();
			                }
			            });
			
			            // CONSOLE FULLSCREEN LOGIC
			            function toggleFullscreenLayout() {
			                $('body').toggleClass('fullscreen-mode');
			                if ($('body').hasClass('fullscreen-mode')) {
			                    $('#btnToggleFullscreen').text('[Thu nhỏ]');
			                    $('body').append($jsControlsBlock);
			                } else {
			                    $('#btnToggleFullscreen').text('[Toàn màn hình]');
			                    $panelJavaScript.append($jsControlsBlock);
			                }
			            }
			            $('#btnToggleFullscreen').click(toggleFullscreenLayout);
			
			            function clearConsoleLogs() { $consoleLog.empty(); }
			            $('#btnClearConsole').click(clearConsoleLogs);
			            $('#btnClearConsoleBtn').click(clearConsoleLogs);
			
			            function logToConsole(message, type = 'log') {
			                let extraClass = '';
			                if (type === 'error') extraClass = 'log-error';
			                if (type === 'info') extraClass = 'log-info';
			                if (type === 'return') extraClass = 'log-return';
			
			                let formattedMessage = message;
			                if (typeof message === 'object' && message !== null) {
			                    try { formattedMessage = JSON.stringify(message, null, 4); } catch(e) { formattedMessage = String(message); }
			                } else if (typeof message === 'string') {
			                    let trimmed = message.trim();
			                    if ((trimmed.startsWith('{') && trimmed.endsWith('}')) || (trimmed.startsWith('[') && trimmed.endsWith(']'))) {
			                        try {
			                            let parsed = JSON.parse(message);
			                            formattedMessage = JSON.stringify(parsed, null, 4);
			                        } catch (e) { formattedMessage = message; }
			                    }
			                }
			                
			                let headerPrefix = type === 'return' ? `👉 [Return] [${new Date().toLocaleTimeString()}]\n` : `[${new Date().toLocaleTimeString()}] `;
			                
			                let $logItem = $('<div>').addClass('log-item').addClass(extraClass);
			                let $textContainer = $('<span>').text(headerPrefix + formattedMessage);
			                $logItem.append($textContainer);
			                
			                $consoleLog.prepend($logItem);
			                $consoleLog.scrollTop(0);
			            }
			
			            const nativeLog = console.log;
			            const nativeError = console.error;
			
			            function lockDownRedirects() {
			                try {
			                    Object.defineProperty(window.location, 'href', {
			                        set: function(val) { logToConsole(`[Bảo vệ] Đã chặn mã JS cố gắng chuyển hướng tới: ${val}`, 'error'); },
			                        configurable: true
			                    });
			                } catch (e) {}
			            }
			
			            $('#btnFetch').click(function() {
			                let targetUrl = $('#urlInput').val().trim();
			                if (!targetUrl) { alert('Vui lòng nhập URL.'); return; }
			                if (!/^https?:\/\//i.test(targetUrl)) { targetUrl = 'https://' + targetUrl; $('#urlInput').val(targetUrl); }
			
			                logToConsole(`Đang gửi yêu cầu cào dữ liệu qua Google Script...`, 'info');
			                $.get(GOOGLE_SCRIPT_PROXY, { url: GOOGLE_SCRIPT_PROXY + "?url=" + targetUrl }, function(htmlResponse) {
			                    if (htmlResponse && !htmlResponse.startsWith("Lỗi:")) {
			                        let cleanHtml = htmlResponse.replace(/<meta\s+http-equiv=["']refresh["'][^>]*>/gi, '');
			                        $htmlInput.val(cleanHtml);
			                        syncGlobalAndIframe(); 
			                        logToConsole('Cào và đồng bộ Source HTML thành công!', 'info');
			                    } else { logToConsole('Proxy báo lỗi: ' + htmlResponse, 'error'); }
			                }).fail(function() { logToConsole('Lỗi kết nối đến Google Apps Script.', 'error'); });
			            });
			
			            $jsInput.on('input blur', function() {
			                let jsCode = $(this).val();
			                let funcRegex = /(?:function\s+([a-zA-Z0-9_$]+)|(?:const|let|var)\s+([a-zA-Z0-9_$]+)\s*=\s*(?:function|\([^)]*\)\s*=>))/g;
			                let match, functions = [];
			                while ((match = funcRegex.exec(jsCode)) !== null) {
			                    let funcName = match[1] || match[2];
			                    if (funcName && !functions.includes(funcName)) { functions.push(funcName); }
			                }
			                let currentSelected = $functionSelect.val();
			                $functionSelect.html('<option value="">-- Chọn hàm cụ thể --</option>');
			                if (functions.length > 0) {
			                    functions.forEach(f => { $functionSelect.append(`<option value="${f}">${f}()</option>`); });
			                }
			                if (functions.includes(currentSelected)) { $functionSelect.val(currentSelected); }
			                $functionSelect.trigger('change');
			            });
			
			            $functionSelect.change(function() {
			                if ($(this).val()) { $btnRunFunc.removeAttr('disabled'); } 
			                else { $btnRunFunc.attr('disabled', 'disabled'); }
			            });
			
			            function executeEngine(runMode) {
			                let htmlCode = $htmlInput.val();
			                if (htmlCode) {
			                    let $cleanHtml = $('<div>').html(htmlCode);
			                    $cleanHtml.find('script').remove(); 
			                    $sandbox.html($cleanHtml.html());
			                } else { $sandbox.empty(); }
			
			                lockDownRedirects();
			                let jsCode = $jsInput.val();
			                
			                window.console.log = function(...args) {
			                    logToConsole(args.length > 1 ? args : args[0]);
			                    nativeLog.apply(console, args);
			                };
			                window.console.error = function(...args) {
			                    logToConsole(args.length > 1 ? args : args[0], 'error');
			                    nativeError.apply(console, args);
			                };
			
			                let executeCode = '';
			                if (runMode === 'single') {
			                    let selectedFunc = $functionSelect.val();
			                    logToConsole(`--- Bắt đầu chạy hàm: ${selectedFunc}() ---`, 'info');
			                    executeCode = `${jsCode}\n;try { let result = ${selectedFunc}(); if(result !== undefined) console.info(result); } catch(err) { console.error(err.message); }`;
			                } else {
			                    logToConsole('--- Bắt đầu chạy toàn bộ JavaScript ---', 'info');
			                    executeCode = jsCode;
			                }
			
			                try {
			                    let interceptorJs = `
			                        (function($, jQuery){
			                            var html = window.html;
			                            console.info = function(msg) { window.customLogReturn(msg); };
			                            ${executeCode}
			                        })(function(selector, context){ 
			                            return jQuery(selector, context || '#sandbox'); 
			                        }, function(selector, context){ 
			                            return jQuery(selector, context || '#sandbox'); 
			                        });
			                    `;
			                    window.customLogReturn = function(val) { logToConsole(val, 'return'); };
			                    window.eval(interceptorJs);
			                } catch (error) { logToConsole(error.name + ': ' + error.message, 'error'); }
			            }
			
			            $('#btnRunAll').click(function() { executeEngine('all'); });
			            $btnRunFunc.click(function() { executeEngine('single'); });
			        });
		</script>
	</body>

</html>
